name: workia-space

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workia-space
    restart: unless-stopped
    ports:
      - '3211:3210'
    environment:
      # -- Core ----------------------------------------------
      - APP_URL=${APP_URL}
      - PORT=${PORT:-3210}
      - MIDDLEWARE_REWRITE_THROUGH_LOCAL=${MIDDLEWARE_REWRITE_THROUGH_LOCAL:-1}
      - AUTH_SECRET=${AUTH_SECRET}
      - KEY_VAULTS_SECRET=${KEY_VAULTS_SECRET}
      - JWKS_KEY=${JWKS_KEY}
      - AUTH_TRUSTED_ORIGINS=${AUTH_TRUSTED_ORIGINS}

      # -- Database ------------------------------------------
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_DRIVER=${DATABASE_DRIVER:-node}

      # -- Redis ---------------------------------------------
      - REDIS_URL=${REDIS_URL}
      - REDIS_PREFIX=${REDIS_PREFIX:-lobehub}

      # -- Auth ----------------------------------------------
      - AUTH_SSO_PROVIDERS=${AUTH_SSO_PROVIDERS:-}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID:-}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET:-}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID:-}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET:-}
      - AUTH_DISABLE_EMAIL_PASSWORD=${AUTH_DISABLE_EMAIL_PASSWORD:-0}
      - AUTH_ENABLE_MAGIC_LINK=${AUTH_ENABLE_MAGIC_LINK:-0}
      - AUTH_EMAIL_VERIFICATION=${AUTH_EMAIL_VERIFICATION:-0}

      # -- Email ---------------------------------------------
      - EMAIL_SERVICE_PROVIDER=${EMAIL_SERVICE_PROVIDER:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM=${RESEND_FROM:-}

      # -- S3 ------------------------------------------------
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_PUBLIC_DOMAIN=${S3_PUBLIC_DOMAIN:-}
      - S3_REGION=${S3_REGION:-auto}
      - S3_SET_ACL=${S3_SET_ACL:-0}
      - S3_ENABLE_PATH_STYLE=${S3_ENABLE_PATH_STYLE:-0}

      # -- LLM -----------------------------------------------
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MANAGEMENT_KEY=${OPENROUTER_MANAGEMENT_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # -- Busca / Crawler -----------------------------------
      - SEARCH_PROVIDERS=${SEARCH_PROVIDERS:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - CRAWLER_IMPLS=${CRAWLER_IMPLS:-}
      - DEFAULT_FILES_CONFIG=${DEFAULT_FILES_CONFIG:-}

      # -- STT -----------------------------------------------
      - GROQ_API_KEY=${GROQ_API_KEY:-}

      # -- QStash --------------------------------------------
      - QSTASH_URL=${QSTASH_URL:-}
      - QSTASH_TOKEN=${QSTASH_TOKEN:-}
      - QSTASH_CURRENT_SIGNING_KEY=${QSTASH_CURRENT_SIGNING_KEY:-}
      - QSTASH_NEXT_SIGNING_KEY=${QSTASH_NEXT_SIGNING_KEY:-}

      # -- Feature flags -------------------------------------
      - ENABLE_BUSINESS_FEATURES=${ENABLE_BUSINESS_FEATURES:-}
